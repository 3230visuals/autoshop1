<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#0f1114"/>
  <g opacity="0.15" transform="translate(100, 150)">
    <!-- Car body -->
    <path d="M50 200 Q50 180 70 170 L180 140 Q200 130 220 110 L350 60 Q370 50 400 50 L480 55 Q500 58 510 70 L540 120 Q545 130 560 135 L580 140 Q600 145 600 165 L600 200" stroke="#ffffff" stroke-width="3" fill="none"/>
    <!-- Roof -->
    <path d="M220 110 Q230 80 260 65 L380 45 Q400 42 420 45 L480 55" stroke="#ffffff" stroke-width="2" fill="none"/>
    <!-- Windows -->
    <path d="M235 105 L280 70 L380 55 L420 58 L465 68 L500 90 L490 105 Z" stroke="#ffffff" stroke-width="1.5" fill="#ffffff" fill-opacity="0.03"/>
    <line x1="370" y1="55" x2="365" y2="105" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Wheels -->
    <circle cx="160" cy="200" r="40" stroke="#ffffff" stroke-width="3" fill="none"/>
    <circle cx="160" cy="200" r="25" stroke="#ffffff" stroke-width="1.5" fill="none"/>
    <circle cx="160" cy="200" r="5" fill="#ffffff" fill-opacity="0.3"/>
    <circle cx="490" cy="200" r="40" stroke="#ffffff" stroke-width="3" fill="none"/>
    <circle cx="490" cy="200" r="25" stroke="#ffffff" stroke-width="1.5" fill="none"/>
    <circle cx="490" cy="200" r="5" fill="#ffffff" fill-opacity="0.3"/>
    <!-- Headlight -->
    <ellipse cx="590" cy="155" rx="12" ry="8" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="1.5"/>
    <!-- Taillight -->
    <rect x="52" y="168" width="15" height="8" rx="2" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-width="1"/>
    <!-- Ground line -->
    <line x1="30" y1="240" x2="620" y2="240" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  </g>
  <!-- Label -->
  <text x="400" y="430" text-anchor="middle" fill="#ffffff" fill-opacity="0.12" font-family="system-ui, sans-serif" font-size="14" font-weight="700" letter-spacing="6">VEHICLE IMAGE PENDING</text>
</svg>
